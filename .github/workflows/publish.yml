name: Build and publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag to build and publish (for example v4.2.1)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag input
        run: |
          ref="${{ github.event.inputs.ref }}"
          case "$ref" in
            refs/tags/*|v[0-9]*)
              ;;
            *)
              echo "Expected a release tag like v4.2.1, got: $ref" >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2.2" "packaging>=24.2" "twine>=6.1.0"

      - name: Build sdist + wheel
        run: |
          python -m build --sdist --wheel --outdir dist

      - name: Check dist contents
        run: |
          ls -lah dist
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install "packaging>=24.2" "twine>=6.1.0"
          python -m twine upload --skip-existing dist/*
